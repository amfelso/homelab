# Image configuration
image:
  repository: ghcr.io/amfelso/pi-agent
  tag: latest
  pullPolicy: Always

# Metric collector configuration
collector:
  name: metric-collector
  schedule: 60 # Default collection interval = every 1 minute
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
